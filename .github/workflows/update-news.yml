name: עדכון חדשות שעתי

on:
  schedule:
    # כל שעה עגולה (UTC = ישראל +2/+3, שתיהן היסט שעה שלמה, אז "עגול" גם אצלנו)
    - cron: '0 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install feedparser requests

      - run: python scripts/collect_news.py

      - name: Commit ו-push אם יש שינוי
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/news_data.js data/news_data.json
          git diff --cached --quiet || git commit -m "עדכון חדשות אוטומטי"
          git push
