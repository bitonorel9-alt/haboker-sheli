name: עדכון חדשות יומי

on:
  schedule:
    # 04:30 UTC ≈ 07:30 בישראל בקיץ (UTC+3). בחורף (UTC+2) זה ייצא 06:30 -
    # מוקדם משעה, לא מאוחר, כדי שהתמצית תמיד תהיה מוכנה עד 07:30.
    - cron: '30 4 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install feedparser requests

      - run: python scripts/collect_news.py

      - name: Commit ו-push אם יש שינוי
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/news_data.js data/news_data.json
          git diff --cached --quiet || git commit -m "עדכון חדשות יומי אוטומטי"
          git push
